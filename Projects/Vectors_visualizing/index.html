  <body>
    <input type="number" id="vx1" placeholder="vx1">

    <button onclick="drawVectors()">Draw Vectors</button>

    <ul>
      <li id = "label1">v1 = (vx1, vy1)</li>
      <li id = "label2">v2 = (vx2, vy2)</li>
      <li id = "label3">v3 = (vx1 + vx2, vy1 + vy2)</li>
    </ul>
  </body>
</html>
